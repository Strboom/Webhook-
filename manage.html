<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onyx — Server Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060711;--bg2:#0d0f1e;--bg3:#111328;
  --purple:#7c3aed;--purple-light:#a78bfa;--purple-dim:rgba(124,58,237,.15);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --green:#10b981;--yellow:#facc15;--red:#ef4444;
  --radius:12px;--radius-sm:8px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(124,58,237,.35);border-radius:3px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora::before,.aurora::after{content:'';position:absolute;border-radius:50%;animation:float 14s ease-in-out infinite alternate}
.aurora::before{width:65vw;height:65vh;top:-20vh;left:-15vw;background:radial-gradient(ellipse,rgba(124,58,237,.11) 0%,transparent 70%)}
.aurora::after{width:55vw;height:55vh;bottom:-15vh;right:-15vw;background:radial-gradient(ellipse,rgba(99,102,241,.09) 0%,transparent 70%);animation-delay:3s}
@keyframes float{to{transform:translate(7%,5%) scale(1.12)}}

.z1{position:relative;z-index:1}
.card{background:rgba(13,15,30,.82);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(10px)}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:.75rem;font-weight:600}
.badge-premium{background:rgba(250,204,21,.12);color:var(--yellow);border:1px solid rgba(250,204,21,.25)}
.badge-cat{padding:2px 8px;border-radius:999px;font-size:.7rem;font-weight:600}
.spin{width:32px;height:32px;border:2px solid var(--purple);border-top-color:transparent;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green)}
.pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(16,185,129,.4);animation:pulse 2s ease-out infinite}
@keyframes pulse{to{opacity:0;transform:scale(2.5)}}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.flex-1{flex:1}.min-w-0{min-width:0}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.hidden{display:none!important}

/* Nav */
nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:rgba(6,7,17,.88);backdrop-filter:blur(14px)}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 1.25rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:.75rem}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 20px rgba(124,58,237,.4)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.avatar-sm{width:30px;height:30px;border-radius:50%;object-fit:cover}
.btn-ghost{padding:.35rem .75rem;border-radius:var(--radius-sm);font-size:.82rem;color:var(--muted);border:1px solid var(--border);transition:color .15s,border-color .15s}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}

/* Views */
#view-servers,#view-server{display:none}
#view-servers.active,#view-server.active{display:block}

/* Servers */
#view-servers{padding:2.5rem 1.25rem;max-width:1080px;margin:0 auto}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-bottom:2.5rem}
.stat-card{background:rgba(13,15,30,.8);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:.875rem}
.stat-icon{width:38px;height:38px;border-radius:10px;background:rgba(124,58,237,.13);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.stat-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.1rem}
.stat-value{font-size:1.25rem;font-weight:700;color:var(--text)}
.servers-title{font-size:1.4rem;font-weight:700;margin-bottom:.35rem}
.servers-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
.server-card{background:rgba(13,15,30,.82);border:1px solid var(--border);border-radius:var(--radius);padding:1.125rem 1.25rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:border-color .15s,transform .15s;width:100%;text-align:left}
.server-card:hover{border-color:rgba(124,58,237,.3);transform:scale(1.015)}
.server-icon{width:46px;height:46px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.server-name{font-weight:600;margin-bottom:.15rem}
.server-meta{font-size:.8rem;color:var(--muted)}
.chevron{color:var(--purple-light);opacity:0;transition:opacity .15s;margin-left:auto;flex-shrink:0;font-size:1.2rem}
.server-card:hover .chevron{opacity:1}
.empty-state{text-align:center;padding:4rem 2rem;border-radius:var(--radius);background:rgba(13,15,30,.6);border:1px solid var(--border)}
.empty-icon{font-size:2.5rem;margin-bottom:1rem}

/* Server detail */
#view-server{max-width:1080px;margin:0 auto;padding:0 1.25rem 3rem}
.breadcrumb{display:flex;align-items:center;gap:.5rem;padding:1rem 0 .5rem;font-size:.85rem;color:var(--muted)}
.breadcrumb a{cursor:pointer;transition:color .15s}.breadcrumb a:hover{color:var(--text)}
.sep{color:rgba(255,255,255,.2)}
.server-hero{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(13,15,30,.9));border:1px solid rgba(124,58,237,.25);border-radius:var(--radius);padding:1.5rem;display:flex;align-items:center;gap:1.25rem;margin-bottom:1.5rem}
.server-hero-icon{width:60px;height:60px;border-radius:14px;object-fit:cover;flex-shrink:0}
.server-hero-name{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
.server-hero-meta{font-size:.85rem;color:var(--muted2)}

/* Tabs */
.tabs{border-bottom:1px solid rgba(255,255,255,.06);display:flex;overflow-x:auto;margin-bottom:1.5rem;gap:.25rem;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:.6rem 1rem;font-size:.88rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;background:none;border-left:none;border-right:none;border-top:none}
.tab-btn.active{color:#c4b5fd;border-bottom-color:var(--purple)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Leaderboard */
.leader-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-radius:var(--radius-sm);border-bottom:1px solid rgba(255,255,255,.04)}
.leader-row.top3{background:rgba(124,58,237,.07)}
.leader-rank{width:28px;text-align:center;font-size:.85rem;flex-shrink:0}
.leader-uid{font-size:.82rem;font-family:monospace;color:var(--muted2)}
.leader-val{font-size:.85rem;font-weight:600;text-align:right}

/* Setting row */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-radius:var(--radius-sm);background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);margin-bottom:.5rem}
.setting-label{font-size:.85rem;color:var(--muted2)}
.setting-value{font-size:.85rem;font-weight:600}

/* Commands */
.cmd-filters{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.cmd-filter{padding:.3rem .875rem;border-radius:999px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.07)}
.cmd-filter.active{border-color:rgba(124,58,237,.4)}
.cmd-card{border-radius:var(--radius-sm);padding:.875rem 1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.cmd-name{font-family:monospace;font-weight:700;color:#c4b5fd;font-size:.9rem}
.cmd-desc{font-size:.78rem;color:var(--muted);margin-top:.25rem}

/* Loading overlay */
#page-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
#page-loader.hide{display:none}
</style>
</head>
<body>

<div id="page-loader"><div class="spin"></div></div>
<div class="aurora"></div>

<nav class="z1">
  <div class="nav-inner">
    <div class="nav-brand">
      <div class="logo">✦</div>
      <strong>Onyx</strong>
      <div id="nav-status" class="flex items-center gap-2" style="margin-left:.75rem;display:none;position:relative">
        <span id="status-dot" class="pulse" style="position:relative"></span>
        <span id="status-text" style="font-size:.78rem;color:var(--muted)">Online</span>
      </div>
    </div>
    <div class="nav-right">
      <img id="nav-avatar" class="avatar-sm hidden" src="" alt="" />
      <span id="nav-username" style="font-size:.85rem;font-weight:500;display:none"></span>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="z1">

  <!-- SERVERS LIST -->
  <div id="view-servers">
    <div class="stat-grid" id="stats-grid"></div>
    <h2 class="servers-title">Your Servers</h2>
    <p class="servers-sub">Servers where you have admin access and Onyx is present</p>
    <div id="servers-list" class="grid2"></div>
  </div>

  <!-- SERVER DETAIL -->
  <div id="view-server">
    <div class="breadcrumb">
      <a onclick="showServers()">← Servers</a>
      <span class="sep">/</span>
      <img id="detail-icon" class="avatar-sm" src="" alt="" style="width:20px;height:20px;border-radius:5px" />
      <span id="detail-name" style="font-weight:600;color:var(--text)"></span>
      <span id="detail-premium-badge" class="badge badge-premium hidden">✦ Premium</span>
    </div>

    <div class="server-hero">
      <img id="hero-icon" class="server-hero-icon" src="" alt="" />
      <div>
        <div class="flex items-center gap-3 flex-wrap">
          <h1 id="hero-name" class="server-hero-name"></h1>
          <span id="hero-premium" class="badge badge-premium hidden">✦ Premium</span>
        </div>
        <p id="hero-meta" class="server-hero-meta"></p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('economy',this)">Economy</button>
      <button class="tab-btn" onclick="switchTab('levels',this)">Levels</button>
      <button class="tab-btn" onclick="switchTab('commands',this)">Commands</button>
      <button class="tab-btn" onclick="switchTab('settings',this)">Settings</button>
    </div>

    <div id="tab-overview" class="tab-panel active">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem" id="overview-grid"></div>
      <div class="card" style="padding:1.25rem" id="overview-economy-preview"></div>
    </div>

    <div id="tab-economy" class="tab-panel">
      <div class="grid3" style="margin-bottom:1rem" id="econ-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Wealth Leaderboard</p><div id="econ-leaders"></div></div>
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Daily Streak Leaders</p><div id="streak-leaders"></div></div>
      </div>
    </div>

    <div id="tab-levels" class="tab-panel">
      <div class="grid3" style="margin-bottom:1rem" id="level-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">XP Leaderboard</p><div id="xp-leaders"></div></div>
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Most Active (Weekly)</p><div id="chat-leaders"></div></div>
      </div>
    </div>

    <div id="tab-commands" class="tab-panel">
      <div class="cmd-filters" id="cmd-filters"></div>
      <div class="grid2" id="cmd-list"></div>
    </div>

    <div id="tab-settings" class="tab-panel">
      <div style="max-width:580px;display:flex;flex-direction:column;gap:1rem">
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Server Configuration</p><div id="settings-config"></div></div>
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Premium</p><div id="settings-premium"></div></div>
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">AI Personality</p><div id="settings-personality"></div></div>
        <div class="card" style="padding:1.25rem"><p class="stat-label" style="margin-bottom:.75rem">Quick Commands</p><div class="grid2" id="settings-cmds"></div></div>
      </div>
    </div>
  </div>

</div>

<script>
const BACKEND = "https://onyxbot-ten.vercel.app";
const API = BACKEND + "/api";
const LOGIN_URL = "https://onyxai.site/dashboard.html";

const COMMANDS = [
  {name:"+chat",desc:"Chat with Onyx AI — sarcastic, warm and unhinged",cat:"AI"},
  {name:"+debate",desc:"AI debates both sides of any topic",cat:"AI"},
  {name:"+roast",desc:"Get a playful AI roast",cat:"AI"},
  {name:"+compliment",desc:"Send a heartfelt compliment to someone",cat:"AI"},
  {name:"+joke",desc:"Get a fresh joke from Onyx",cat:"AI"},
  {name:"+activate-ai",desc:"Enable AI auto-replies in this channel",cat:"AI"},
  {name:"+stop-ai",desc:"Disable AI auto-replies in this channel",cat:"AI"},
  {name:"+engage",desc:"Onyx randomly chimes in (20% chance)",cat:"AI",premium:true},
  {name:"+disengage",desc:"Make Onyx stay silent until @mentioned",cat:"AI",premium:true},
  {name:"+disable-ai",desc:"Completely disable AI in this server",cat:"AI"},
  {name:"+daily",desc:"Claim your daily coins",cat:"Economy"},
  {name:"+work",desc:"Work to earn coins",cat:"Economy"},
  {name:"+balance",desc:"Check your wallet and bank balance",cat:"Economy"},
  {name:"+deposit",desc:"Deposit coins into your bank",cat:"Economy"},
  {name:"+withdraw",desc:"Withdraw coins from your bank",cat:"Economy"},
  {name:"+transfer",desc:"Transfer coins to another user",cat:"Economy"},
  {name:"+rob",desc:"Attempt to rob another user (risky!)",cat:"Economy"},
  {name:"+heist",desc:"Start a server heist",cat:"Economy"},
  {name:"+shop",desc:"View the server shop",cat:"Economy"},
  {name:"+buy",desc:"Buy an item from the shop",cat:"Economy"},
  {name:"+8ball",desc:"Ask the magic 8-ball a question",cat:"Fun"},
  {name:"+coinflip",desc:"Flip a coin",cat:"Fun"},
  {name:"+roll",desc:"Roll a dice",cat:"Fun"},
  {name:"+meme",desc:"Get a random meme",cat:"Fun"},
  {name:"+ship",desc:"Check love compatibility between two users",cat:"Fun"},
  {name:"+hug",desc:"Hug someone",cat:"Fun"},
  {name:"+afk",desc:"Set yourself as AFK with a reason",cat:"Fun"},
  {name:"+trivia",desc:"Start a trivia game",cat:"Games"},
  {name:"+hangman",desc:"Play hangman",cat:"Games"},
  {name:"+scramble",desc:"Unscramble a word against the clock",cat:"Games"},
  {name:"+tictactoe",desc:"Play tic-tac-toe with someone",cat:"Games"},
  {name:"+ludo",desc:"Start a Ludo board game",cat:"Games"},
  {name:"+rank",desc:"Check your XP rank card",cat:"Leveling"},
  {name:"+levels",desc:"View the XP leaderboard",cat:"Leveling"},
  {name:"+setlevelup",desc:"Configure level-up announcements",cat:"Leveling"},
  {name:"+play",desc:"Play a song in your voice channel",cat:"Music"},
  {name:"+skip",desc:"Skip the current song",cat:"Music"},
  {name:"+stop",desc:"Stop music and disconnect",cat:"Music"},
  {name:"+queue",desc:"View the music queue",cat:"Music"},
  {name:"+help",desc:"Get the list of all commands",cat:"Utility"},
  {name:"+ping",desc:"Check bot latency",cat:"Utility"},
  {name:"+avatar",desc:"Get a user's avatar",cat:"Utility"},
  {name:"+serverinfo",desc:"Get server information",cat:"Utility"},
  {name:"+userinfo",desc:"Get user information",cat:"Utility"},
  {name:"+prefix",desc:"Change the bot prefix for this server",cat:"Utility"},
  {name:"+announce",desc:"Send an announcement to broadcast channel",cat:"Utility"},
  {name:"+setpersonality",desc:"Give Onyx a custom personality",cat:"Premium",premium:true},
  {name:"+clearpersonality",desc:"Reset Onyx's personality to default",cat:"Premium",premium:true},
  {name:"+viewpersonality",desc:"View your server's custom personality",cat:"Premium",premium:true},
  {name:"+setserverpfp",desc:"Request a custom Onyx profile picture",cat:"Premium",premium:true},
  {name:"+clearserverpfp",desc:"Remove your server's custom PFP",cat:"Premium",premium:true},
];
const CAT_COLORS={AI:"#7c3aed",Economy:"#10b981",Fun:"#f59e0b",Games:"#ef4444",Leveling:"#3b82f6",Music:"#ec4899",Utility:"#64748b",Premium:"#facc15"};

let _token=null,_user=null,_currentServer=null,_currentCat="All";

function fmt(n){if(!n)return"0";n=Number(n);if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString()}
function coins(n){return"✦ "+fmt(n)}
function shortId(uid){return"…"+String(uid).slice(-4)}
function guildIcon(id,icon,size=64){if(icon)return`https://cdn.discordapp.com/icons/${id}/${icon}.png?size=${size}`;return`https://cdn.discordapp.com/embed/avatars/${Number(BigInt(id)>>22n)%6}.png`}
function rank(i){return i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
function setHTML(id,html){const e=document.getElementById(id);if(e)e.innerHTML=html}
function leaderHTML(arr,fn){return`<div>${arr.map((e,i)=>fn(e,i)).join("")}</div>`}
function settingRow(label,val){return`<div class="setting-row"><span class="setting-label">${label}</span><span class="setting-value">${val}</span></div>`}

function logout(){
  localStorage.removeItem("onyx_token");
  window.location.replace(LOGIN_URL);
}

async function apiFetch(path,ms=6000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(API+path,{headers:{Authorization:"Bearer "+_token},signal:ctrl.signal});
    clearTimeout(tid);
    return r.ok?r.json():null;
  }catch(e){clearTimeout(tid);return null}
}

async function init(){
  _token=localStorage.getItem("onyx_token");
  if(!_token){window.location.replace(LOGIN_URL);return}

  try{
    const r=await fetch(API+"/auth/me",{headers:{Authorization:"Bearer "+_token}});
    if(!r.ok){localStorage.removeItem("onyx_token");window.location.replace(LOGIN_URL);return}
    _user=await r.json();
  }catch(e){window.location.replace(LOGIN_URL);return}

  // Update nav
  const av=document.getElementById("nav-avatar");
  av.src=_user.avatar||"";av.classList.remove("hidden");
  const un=document.getElementById("nav-username");
  un.textContent=_user.globalName||_user.username||"";un.style.display="";

  document.getElementById("page-loader").classList.add("hide");
  showServers();
}

async function showServers(){
  document.getElementById("view-servers").classList.add("active");
  document.getElementById("view-server").classList.remove("active");
  const[stats,servers]=await Promise.all([apiFetch("/stats"),apiFetch("/servers")]);
  renderStats(stats);
  renderServers(servers||[]);
}

function showDetail(){
  document.getElementById("view-servers").classList.remove("active");
  document.getElementById("view-server").classList.add("active");
}

function renderStats(s){
  if(!s)return;
  const online=s.botOnline;
  const dot=document.getElementById("status-dot");
  const txt=document.getElementById("status-text");
  const ns=document.getElementById("nav-status");
  if(dot)dot.style.background=online?"#10b981":"#ef4444";
  if(txt)txt.textContent=online?"Online":"Offline";
  if(ns)ns.style.display="flex";
  setHTML("stats-grid",`
    <div class="stat-card"><div class="stat-icon">🌐</div><div><div class="stat-label">Servers</div><div class="stat-value">${fmt(s.totalGuilds)}</div></div></div>
    <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-label">Users</div><div class="stat-value">${fmt(s.totalUsers)}</div></div></div>
    <div class="stat-card"><div class="stat-icon">⚡</div><div><div class="stat-label">Latency</div><div class="stat-value">${s.latencyMs||0}ms</div></div></div>
    <div class="stat-card"><div class="stat-icon">🤖</div><div><div class="stat-label">Status</div><div class="stat-value" style="color:${online?"#10b981":"#ef4444"}">${online?"Online":"Offline"}</div></div></div>
  `);
}

function renderServers(list){
  const c=document.getElementById("servers-list");
  if(!list.length){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">🤖</div><p style="font-weight:600">No servers found</p><p style="font-size:.85rem;color:var(--muted);margin-top:.5rem">You need admin access in a server where Onyx is present, and the bot must have pushed data recently.</p></div>`;
    return;
  }
  c.innerHTML="";
  list.forEach(srv=>{
    const icon=guildIcon(srv.id,srv.icon,128);
    const card=document.createElement("button");
    card.className="server-card";
    card.innerHTML=`<img class="server-icon" src="${icon}" alt="${srv.name}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/><div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="server-name truncate">${srv.name}</span>${srv.isPremium?'<span class="badge badge-premium">✦ Premium</span>':""}</div><div class="server-meta">${fmt(srv.memberCount)} members</div></div><div class="chevron">›</div>`;
    card.onclick=()=>openServer(srv);
    c.appendChild(card);
  });
}

async function openServer(srv){
  _currentServer=srv;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.textContent==="Overview"));
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("active",p.id==="tab-overview"));
  const icon=guildIcon(srv.id,srv.icon,128);
  document.getElementById("detail-icon").src=icon;
  document.getElementById("detail-name").textContent=srv.name;
  document.getElementById("hero-icon").src=icon;
  document.getElementById("hero-name").textContent=srv.name;
  document.getElementById("hero-meta").textContent=`${fmt(srv.memberCount)} members`;
  ["detail-premium-badge","hero-premium"].forEach(id=>{
    const e=document.getElementById(id);
    if(e) srv.isPremium?e.classList.remove("hidden"):e.classList.add("hidden");
  });
  showDetail();
  const data=await apiFetch("/server/"+srv.id);
  if(!data)return;
  _currentServer={..._currentServer,...data.guild};
  renderOverview(data);renderEconomy(data);renderLevels(data);renderCommands(_currentCat);renderSettings(data);
  if(data.guild){
    const ico=guildIcon(data.guild.id,data.guild.icon,128);
    document.getElementById("detail-icon").src=ico;
    document.getElementById("detail-name").textContent=data.guild.name;
    document.getElementById("hero-icon").src=ico;
    document.getElementById("hero-name").textContent=data.guild.name;
    document.getElementById("hero-meta").textContent=`${fmt(data.guild.memberCount)} members${data.guild.joinedAt?" · joined "+new Date(data.guild.joinedAt).toLocaleDateString():""}`;
    if(data.isPremium){document.getElementById("detail-premium-badge").classList.remove("hidden");document.getElementById("hero-premium").classList.remove("hidden")}
  }
}

function renderOverview(d){
  setHTML("overview-grid",`
    <div class="card" style="padding:1.25rem">
      <p class="stat-label" style="margin-bottom:.75rem">Status</p>
      ${settingRow("Premium",d.isPremium?"<span style='color:#facc15'>✦ Active</span>":"<span style='color:var(--muted)'>Not active</span>")}
      ${settingRow("AI Engage Mode",d.engageEnabled?"<span style='color:#10b981'>Enabled</span>":"<span style='color:var(--muted)'>Disabled</span>")}
      ${settingRow("Level Announcements",d.levelupEnabled?"<span style='color:#10b981'>Enabled</span>":"<span style='color:var(--muted)'>Disabled</span>")}
      ${d.premiumExpiry?settingRow("Premium Expires","<span style='color:#facc15'>"+new Date(d.premiumExpiry).toLocaleDateString()+"</span>"):""}
    </div>
    <div class="card" style="padding:1.25rem">
      <p class="stat-label" style="margin-bottom:.75rem">AI Personality</p>
      ${d.personality?`<div style="padding:.75rem;border-radius:8px;font-size:.82rem;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);color:#c4b5fd;line-height:1.6">"${d.personality.slice(0,220)}${d.personality.length>220?"…":""}"</div>`:`<p style="font-size:.85rem;color:var(--muted)">No custom personality set</p>`}
    </div>`);
  const ep=document.getElementById("overview-economy-preview");
  if(!ep)return;
  if(!d.topWallets||!d.topWallets.length){ep.innerHTML="<p class='stat-label'>No economy data yet</p>";return}
  ep.innerHTML=`<p class="stat-label" style="margin-bottom:.75rem">Top Economy (preview)</p>`+leaderHTML(d.topWallets.slice(0,5),(e,i)=>`<div class="leader-row ${i<3?"top3":""}"><span class="leader-rank">${rank(i)}</span><span class="leader-uid">user ${shortId(e.userId)}</span><span class="leader-val" style="color:#10b981">${coins((e.wallet||0)+(e.bank||0))}</span></div>`);
}

function renderEconomy(d){
  setHTML("econ-stats",`
    <div class="card" style="padding:1rem"><p class="stat-label">Richest</p><p style="font-size:1.1rem;font-weight:700;color:#10b981;margin-top:.25rem">${d.topWallets&&d.topWallets[0]?coins((d.topWallets[0].wallet||0)+(d.topWallets[0].bank||0)):"—"}</p></div>
    <div class="card" style="padding:1rem"><p class="stat-label">Top Streak</p><p style="font-size:1.2rem;font-weight:700;margin-top:.25rem">${d.topStreaks&&d.topStreaks[0]?"🔥 "+d.topStreaks[0].streak+" days":"—"}</p></div>
    <div class="card" style="padding:1rem"><p class="stat-label">Players Tracked</p><p style="font-size:1.2rem;font-weight:700;margin-top:.25rem">${fmt(d.topWallets?d.topWallets.length:0)}</p></div>`);
  setHTML("econ-leaders",!d.topWallets||!d.topWallets.length?"<p style='font-size:.85rem;color:var(--muted);text-align:center;padding:2rem 0'>No economy data yet</p>":leaderHTML(d.topWallets,(e,i)=>`<div class="leader-row ${i<3?"top3":""}"><span class="leader-rank">${rank(i)}</span><span class="leader-uid">user ${shortId(e.userId)}</span><span class="leader-val">${coins((e.wallet||0)+(e.bank||0))}</span></div>`));
  setHTML("streak-leaders",!d.topStreaks||!d.topStreaks.length?"<p style='font-size:.85rem;color:var(--muted);text-align:center;padding:2rem 0'>No streak data yet</p>":leaderHTML(d.topStreaks,(e,i)=>`<div class="leader-row ${i<3?"top3":""}"><span class="leader-rank">${rank(i)}</span><span class="leader-uid">user ${shortId(e.userId)}</span><span class="leader-val">🔥 ${e.streak} days</span></div>`));
}

function renderLevels(d){
  setHTML("level-stats",`
    <div class="card" style="padding:1rem"><p class="stat-label">Level Announcements</p><p style="font-size:1rem;font-weight:700;margin-top:.25rem;color:${d.levelupEnabled?"#10b981":"var(--muted)"}">${d.levelupEnabled?"Enabled":"Disabled"}</p></div>
    <div class="card" style="padding:1rem"><p class="stat-label">Highest Level</p><p style="font-size:1.2rem;font-weight:700;margin-top:.25rem">${d.topLevels&&d.topLevels[0]?"Lv "+d.topLevels[0].level:"—"}</p></div>
    <div class="card" style="padding:1rem"><p class="stat-label">Most Active (7d)</p><p style="font-size:1rem;font-weight:700;margin-top:.25rem;color:#7c3aed">${d.topChatters&&d.topChatters[0]?fmt(d.topChatters[0].messages)+" msgs":"—"}</p></div>`);
  setHTML("xp-leaders",!d.topLevels||!d.topLevels.length?"<p style='font-size:.85rem;color:var(--muted);text-align:center;padding:2rem 0'>No XP data yet</p>":leaderHTML(d.topLevels,(e,i)=>`<div class="leader-row ${i<3?"top3":""}"><span class="leader-rank">${rank(i)}</span><span class="leader-uid">user ${shortId(e.userId)}</span><span class="leader-val">Lv ${e.level} · ${fmt(e.xp||0)} XP</span></div>`));
  setHTML("chat-leaders",!d.topChatters||!d.topChatters.length?"<p style='font-size:.85rem;color:var(--muted);text-align:center;padding:2rem 0'>No activity data yet</p>":leaderHTML(d.topChatters,(e,i)=>`<div class="leader-row ${i<3?"top3":""}"><span class="leader-rank">${rank(i)}</span><span class="leader-uid">user ${shortId(e.userId)}</span><span class="leader-val">${fmt(e.messages||0)} msgs</span></div>`));
}

function renderCommands(cat){
  _currentCat=cat;
  const cats=["All",...new Set(COMMANDS.map(c=>c.cat))];
  setHTML("cmd-filters",cats.map(c=>`<button class="cmd-filter ${c===cat?"active":""}" onclick="renderCommands('${c}')" style="${c===cat&&CAT_COLORS[c]?`color:${CAT_COLORS[c]};border-color:${CAT_COLORS[c]}40;background:${CAT_COLORS[c]}15`:""}">${c}</button>`).join(""));
  const list=cat==="All"?COMMANDS:COMMANDS.filter(c=>c.cat===cat);
  setHTML("cmd-list",list.map(cmd=>`<div class="cmd-card"><div class="flex items-center gap-2 flex-wrap"><span class="cmd-name">${cmd.name}</span><span class="badge-cat" style="background:${CAT_COLORS[cmd.cat]||"#7c3aed"}20;color:${CAT_COLORS[cmd.cat]||"#a78bfa"}">${cmd.cat}</span>${cmd.premium?`<span class="badge badge-premium" style="font-size:.68rem;padding:1px 7px">✦ Premium</span>`:""}</div><p class="cmd-desc">${cmd.desc}</p></div>`).join(""));
}

function renderSettings(d){
  const g=d.guild||{};
  setHTML("settings-config",`${settingRow("Guild ID",`<span style="font-family:monospace;font-size:.8rem">${g.id||"—"}</span>`)}${settingRow("Members",fmt(g.memberCount||0))}${settingRow("Bot Joined",g.joinedAt?new Date(g.joinedAt).toLocaleDateString():"Unknown")}`);
  setHTML("settings-premium",d.isPremium
    ?`<div style="padding:.875rem;border-radius:10px;background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.2)"><p style="font-weight:600;color:#facc15">✦ Premium Active</p>${d.premiumExpiry?`<p style="font-size:.82rem;color:var(--muted2);margin-top:.25rem">Expires: ${new Date(d.premiumExpiry).toLocaleDateString()}</p>`:""}</div>`
    :`<div style="padding:.875rem;border-radius:10px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2)"><p style="font-weight:600;color:#a78bfa">Upgrade to Premium</p><p style="font-size:.82rem;color:var(--muted);margin-top:.25rem">Get custom personalities, Onyx engage mode, and server PFP.</p><a href="https://onyxai.site/premium.html" target="_blank" style="display:inline-block;margin-top:.75rem;padding:.5rem 1rem;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:.85rem;font-weight:600">View Plans →</a></div>`);
  setHTML("settings-personality",d.personality
    ?`<div style="padding:.75rem;border-radius:8px;font-size:.82rem;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);color:#c4b5fd;line-height:1.6">"${d.personality}"</div>`
    :`<p style="font-size:.85rem;color:var(--muted)">No custom personality (using default Onyx). Use <code style="color:#c4b5fd">+setpersonality</code> in Discord to set one (Premium required).</p>`);
  setHTML("settings-cmds",[
    ["+prefix &lt;new&gt;","Change command prefix"],
    ["+setlevelup","Configure level-up channel"],
    ["+activate-ai #ch","Enable AI in channel"],
    ["+engage","Toggle random engagement (Premium)"],
  ].map(([cmd,desc])=>`<div style="padding:.75rem;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)"><code style="color:#c4b5fd;font-size:.82rem">${cmd}</code><p style="font-size:.75rem;color:var(--muted);margin-top:.25rem">${desc}</p></div>`).join(""));
}

function switchTab(name,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("active",p.id==="tab-"+name));
  if(name==="commands")renderCommands(_currentCat);
}

window.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
