<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Onyx Bot</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="icon" type="image/jpeg" href="onyx.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .not-found {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .nf-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }
    .nf-pfp {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(124,58,237,0.4);
      box-shadow: 0 0 40px rgba(124,58,237,0.35);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
      animation: pfpFloat 6s ease-in-out infinite;
    }
    .nf-code {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 50%, #a78bfa 100%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      position: relative;
      z-index: 1;
      margin-bottom: 8px;
    }
    .nf-title {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    .nf-sub {
      color: #94a3b8;
      font-size: 1rem;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .nf-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 500px) {
      .nf-btns { flex-direction: column; align-items: stretch; width: 100%; max-width: 300px; }
      .btn { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="aurora"></div>

  <div class="not-found">
    <div class="nf-glow"></div>
    <img src="onyx.jpg" alt="Onyx" class="nf-pfp" />
    <div class="nf-code">404</div>
    <h1 class="nf-title">This page got lost in the void</h1>
    <p class="nf-sub">The page you're looking for doesn't exist — or maybe Onyx ate it. Either way, it's gone.</p>
    <div class="nf-btns">
      <a href="/" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Go Home
      </a>
      <a href="https://discord.gg/CFJPDqkGHe" target="_blank" class="btn btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.004.048.027.095.057.127a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Support Server
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
